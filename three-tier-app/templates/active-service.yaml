{{- if .Values.active.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: frontend-active
  labels:
    {{- include "three-tier-app.labels" . | nindent 4 }}
spec:
  type: NodePort
  selector:
    app: frontend
    color: {{ .Values.active.color }}
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
      nodePort: {{ .Values.active.nodePort }}
{{- end }}