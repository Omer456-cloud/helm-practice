apiVersion: v1
kind: Service
metadata:
  name: {{ include "three-tier-app.fullname" . }}-backend
  labels:
    {{- include "three-tier-app.labels" . | nindent 4 }}
    app: backend
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    app: backend
    release: {{ .Release.Name }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.backend.service.port }}
      targetPort: 5678
