apiVersion: v1
kind: Service
metadata:
  name: {{ include "three-tier-app.fullname" . }}-database
  labels:
    {{- include "three-tier-app.labels" . | nindent 4 }}
    app: database
spec:
  type: {{ .Values.database.service.type }}
  selector:
    app: database
    release: {{ .Release.Name }}
  ports:
    - name: mysql
      protocol: TCP
      port: {{ .Values.database.service.port }}
      targetPort: 3306
