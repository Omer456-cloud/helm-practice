apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "three-tier-app.fullname" . }}-backend
  labels:
    {{- include "three-tier-app.labels" . | nindent 4 }}
    app: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: backend
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: backend
        release: {{ .Release.Name }}
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          args:
            {{- toYaml .Values.backend.args | nindent 12 }}
          ports:
            - name: http
              containerPort: 5678
              protocol: TCP
          env:
            - name: DB_HOST
              value: {{ include "three-tier-app.fullname" . }}-database
            - name: DB_PORT
              value: "{{ .Values.database.service.port }}"
            - name: DB_NAME
              value: {{ .Values.database.auth.database }}
            - name: DB_USER
              value: {{ .Values.database.auth.username }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "three-tier-app.fullname" . }}-database-secret
                  key: db-password
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
